<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajeer Verification Portal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f1f4f9; margin: 0; padding: 0; direction: rtl; }
        .top-nav { background: white; padding: 12px 6%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e1e8ef; }
        .nav-links { display: flex; align-items: center; gap: 20px; font-size: 13px; color: #5d6d7e; }
        .btn-blue { background: #1a237e; color: white; padding: 8px 22px; border-radius: 4px; text-decoration: none; font-weight: bold; }
        .main-title { text-align: center; margin: 40px 0; color: #1a237e; font-size: 24px; font-weight: bold; }
        
        /* Main Layout */
        .container { display: flex; justify-content: center; gap: 20px; padding: 0 5%; max-width: 1300px; margin: auto; }
        .card { background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 33%; padding: 30px; border: 1px solid #f0f4f8; box-sizing: border-box; min-height: 380px; }
        .card-title { color: #1a237e; border-bottom: 2px solid #f1f4f9; padding-bottom: 15px; margin-bottom: 20px; font-size: 19px; font-weight: bold; }
        .info-row { margin-bottom: 18px; text-align: right; }
        .label { color: #8a99a8; font-size: 12px; margin-bottom: 4px; display: block; }
        .value { color: #2c3e50; font-weight: 600; font-size: 15px; display: block; }
        .status-badge { background: #e9f7ef; color: #27ae60; padding: 3px 18px; border-radius: 4px; font-size: 13px; font-weight: bold; display: inline-block; }
        
        .blue-bar { background: #1a237e; color: white; text-align: center; padding: 14px; margin: 45px auto; width: 90%; max-width: 1100px; border-radius: 6px; font-size: 15px; }
        
        /* Footer */
        .footer { background: white; padding: 25px 6%; border-top: 1px solid #e1e8ef; margin-top: 60px; }
        .footer-content { display: flex; justify-content: space-between; align-items: center; max-width: 1400px; margin: auto; }
        .footer-logos { display: flex; align-items: center; gap: 20px; }
        .ministry-text { color: #27ae60; font-size: 12px; font-weight: bold; border-right: 1px solid #ddd; padding-right: 15px; }

        /* Help Button */
        .help-btn { position: fixed; bottom: 30px; left: 30px; background: #1a237e; color: white; padding: 12px 25px; border-radius: 50px; display: flex; align-items: center; gap: 10px; font-size: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); text-decoration: none; z-index: 1000; }

        @media (max-width: 900px) { .container { flex-direction: column; } .card { width: 100%; min-height: auto; } }
    </style>
</head>
<body>

    <header class="top-nav">
        <img src="https://github.com/ajeer-hrsqiwa-bot/ajeer-hrsqiwa/blob/main/ajeer_logo.png.png?raw=true" alt="Ajeer Logo" style="height: 45px;">
        
        <div class="nav-links">
            <span>English</span>
            <span>مركز المعرفة</span>
            <span>تسجيل الدخول</span>
            <a href="#" class="btn-blue">سجل الآن</a>
        </div>
    </header>

    <div class="main-title">تصريح أجير لحلول الموارد البشرية</div>

    <div class="container">
        <div class="card">
            <div class="card-title">معلومات التصريح</div>
            <div class="info-row"><span class="label">اسم الموظف:</span><span class="value">AMIR KHAN</span></div>
            <div class="info-row"><span class="label">حالة التصريح:</span><div><span class="status-badge">فعال</span></div></div>
            <div class="info-row"><span class="label">تاريخ بداية التصريح:</span><span class="value">2026-04-18</span></div>
            <div class="info-row"><span class="label">تاريخ نهاية التصريح:</span>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ব্যক্তিগত তথ্য</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; text-align: center; border-top: 8px solid #0044cc; }
        h2 { color: #333; margin-bottom: 20px; }
        .info { text-align: left; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .label { color: #777; font-size: 12px; }
        .value { color: #222; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Information</h2>
    <div class="info">
        <div class="label">নাম:</div>
        <div class="value">Md Rafsan</div>
    </div>
    <div class="info">
        <div class="label">আইডি:</div>
        <div class="value">A-10293</div>
    </div>
    <div class="info">
        <div class="label">অবস্থা:</div>
        <div class="value" style="color: green;">সক্রিয়</div>
    </div>
</div>

</body>
</html>
